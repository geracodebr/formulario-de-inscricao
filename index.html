<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulãrio de Inscrição</title>
</head>

<body>

    <h1>Formulário de inscrição</h1>

    <form>
        <label for="fullname">Nome completo: </label>
        <input type="text" id="fullname" name="fullname" required><br>

        <label for="email">E-mail: </label>
        <input type="text" id="email" name="email" required><br>

        <label for="age">Idade: </label>
        <input type="number" id="age" name="age" required><br><br>

        <label for="question1">Para qual matéria você está se candidatando para lecionar: </label> <br>
        <select name="question1" id="question1">
            <option value="matematica">Matemática</option>
            <option value="portugues">Português</option>
            <option value="biologia">Biologia</option>
            <option value="ciencias">Ciências</option>
            <option value="História">História</option>
            <option value="geografia">Geografia</option>
            <option value="artes">Artes</option>

        </select><br><br>

        <label for="question2">Nível de escolaridade: </label> <br>
        <select name="question2" id="question2">
            <option value="ensinosuperiorcompleto">Ensino superior completo</option>
            <option value="cursandomestrado">Cursando mestrado</option>
            <option value="mestradocompleto">Mestrado completo</option>
            <option value="cursandodoutorado">Cursando doutorado</option>
            <option value="doutoradocompleto">Doutorado completo</option>

        </select>   <br><br>
        
        <label for="mensagem">Descrição de si mesmo: </label>
        <textarea name="mensagem" id="mensagem" cols="30" rows="10"></textarea>


        <br><br>
        <input type="submit" value="Enviar">

    </form>
</body>

</html>
